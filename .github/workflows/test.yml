name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref_name }}

      - name: Setup PDM
        uses: pdm-project/setup-pdm@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pdm install

      - name: Run Ruff
        run: pdm run ruff check .

      - name: Run tests
        run: pdm run pytest

      - name: Run mutation tests
        uses: mikelane/pytest-gremlins-action@v1
        with:
          parallel: 'true'
          extra-args: '--gremlins --gremlin-report=html'
          command-prefix: 'pdm run'
          skip-install: 'true'

      - name: Deploy report to GitHub Pages
        if: always()
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: coverage/gremlins
          target-folder: reports/${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || 'main' }}
          clean: false

      - name: Add report link to summary
        if: always()
        run: |
          REPORT_PATH="reports/${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || 'main' }}/index.html"
          REPO_NAME="${{ github.event.repository.name }}"
          OWNER="${{ github.event.repository.owner.login }}"
          PAGES_URL="https://${OWNER}.github.io/${REPO_NAME}/${REPORT_PATH}"
          echo "### 👾 Mutation Report" >> $GITHUB_STEP_SUMMARY
          echo "View the detailed mutation report here: [${PAGES_URL}](${PAGES_URL})" >> $GITHUB_STEP_SUMMARY
