name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      security-events: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref_name }}

      - name: Setup PDM
        uses: pdm-project/setup-pdm@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pdm install

      - name: Run Ruff
        run: pdm run ruff check .

      - name: Run tests
        run: pdm run pytest

      - name: Run mutation tests
        uses: mikelane/pytest-gremlins-action@v1
        with:
          parallel: 'true'
          extra-args: '--gremlins --gremlin-report=html --gremlin-report=json'
          command-prefix: 'pdm run'
          skip-install: 'true'

      - name: Generate SARIF report
        if: always()
        run: pdm run gremlins-to-sarif coverage/gremlins/gremlins.json -o gremlins.sarif

      - name: Upload SARIF to GitHub
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gremlins.sarif
          category: pytest-gremlins

      - name: Generate Stryker report
        if: always()
        run: pdm run gremlins-to-stryker coverage/gremlins/gremlins.json -o stryker.json

      - name: Upload to Stryker Dashboard
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          STRYKER_API_KEY: ${{ secrets.STRYKER_DASHBOARD_API_KEY }}
        run: |
          if [ -n "$STRYKER_API_KEY" ]; then
            curl -X PUT https://dashboard.stryker-mutator.io/api/reports/github.com/${{ github.repository }}/main \
              -H "Content-Type: application/json" \
              -H "X-Api-Key: $STRYKER_API_KEY" \
              -d @stryker.json
          else
            echo "Skipping Stryker upload: STRYKER_DASHBOARD_API_KEY secret is not set."
          fi

      - name: Upload to Codecov
        if: always()
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        uses: codecov/codecov-action@v4
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: stryker.json
          flags: mutation

      - name: Deploy report to GitHub Pages
        if: always()
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: coverage/gremlins
          target-folder: reports/${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || 'main' }}
          clean: false

      - name: Add report link to summary
        if: always()
        run: |
          REPORT_PATH="reports/${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || 'main' }}/index.html"
          REPO_NAME="${{ github.event.repository.name }}"
          OWNER="${{ github.event.repository.owner.login }}"
          PAGES_URL="https://${OWNER}.github.io/${REPO_NAME}/${REPORT_PATH}"
          echo "### 👾 Mutation Report" >> $GITHUB_STEP_SUMMARY
          echo "View the detailed mutation report here: [${PAGES_URL}](${PAGES_URL})" >> $GITHUB_STEP_SUMMARY
